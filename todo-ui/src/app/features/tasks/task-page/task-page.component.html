<div class="task-page">
  <app-task-list
    *ngIf="!showTaskForm"
    (addTask)="onAddTask()"
    (editTask)="onEditTask($event)"
    (completeTask)="onCompleteTask($event)"
  ></app-task-list>

  <app-task-form
    *ngIf="showTaskForm"
    [task]="selectedTask"
    (saved)="onTaskSaved()"
    (cancel)="onTaskCanceled()"
  ></app-task-form>
</div>
