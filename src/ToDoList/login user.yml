info:
  name: login user
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:8080/api/v1.0/login
  body:
    type: json
    data: |-
      {
        "username":"admin",
        "password":"admin123"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: auth
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
