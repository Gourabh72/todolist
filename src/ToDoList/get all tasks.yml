info:
  name: get all tasks
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/api/v1.0/tasks
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body[0].id
        method: jsonq
      variable:
        name: id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
