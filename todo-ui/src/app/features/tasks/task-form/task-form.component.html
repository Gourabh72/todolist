<style>
  @import './task-form.component.scss';
  </style>
<div class="form-card">

  <h2>{{ isEditMode ? 'Update' : 'Create' }} Task</h2>

  <form [formGroup]="taskForm">

    <div class="form-group">

      <label>Title</label>

      <input
        type="text"
        formControlName="title">

    </div>

    <div class="form-group">

      <label>Description</label>

      <textarea
        formControlName="description">
      </textarea>

    </div>

    <div class="form-group">

      <label>Status</label>

      <select formControlName="status">

        <option value="IN_PROGRESS">
          IN PROGRESS
        </option>

        <option value="PENDING">
          PENDING
        </option>

        <option value="COMPLETED">
          COMPLETED
        </option>

        <option value="CANCELLED">
          CANCELLED
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Priority</label>

      <select formControlName="priority">

        <option value="LOW">
          LOW
        </option>

        <option value="MEDIUM">
          MEDIUM
        </option>

        <option value="HIGH">
          HIGH
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Due Date</label>

      <input
        type="date"
        formControlName="dueDate">

    </div>

    <button
      type="button"
      class="save-btn"
      (click)="saveTask()">
      {{ isEditMode ? 'Update Task' : 'Save Task' }}
    </button>

    <button
      type="button"
      class="cancel-btn"
      (click)="cancelForm()">
      Cancel
    </button>

  </form>

</div>
